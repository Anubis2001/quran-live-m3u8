<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Streams Dashboard</title>

<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet"
 href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="bg-gray-100 text-gray-800">

<div class="container mx-auto p-6">
  <h1 class="text-3xl font-bold text-center mb-6 text-blue-700">
    HLS Streams Dashboard
  </h1>

  <!-- Upload -->
  <div class="bg-white shadow rounded-lg p-6 mb-6">
    <h2 class="text-xl mb-4">Upload New Stream</h2>
    <form id="uploadForm" class="flex flex-col md:flex-row gap-4">
      <input type="text" name="name" placeholder="Stream Name"
        class="border p-2 rounded flex-1" required>
      <input type="file" name="audio" accept=".mp3"
        class="border p-2 rounded flex-1" required>
      <button class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
        <i class="fas fa-upload"></i> Upload
      </button>
    </form>
  </div>

  <!-- Bulk actions -->
  <div id="bulkActions" class="bg-white shadow rounded-lg p-4 mb-4 hidden">
    <span class="mr-2 font-semibold">Bulk actions:</span>
    <select id="bulkActionSelect" class="border p-2 rounded">
      <option value="">Select action</option>
      <option value="start">Start</option>
      <option value="stop">Stop</option>
      <option value="delete">Delete</option>
    </select>
    <button onclick="applyBulkAction()" class="bg-indigo-600 text-white px-3 py-2 rounded hover:bg-indigo-700 ml-2">
      Apply
    </button>
  </div>

  <!-- Streams -->
  <div class="bg-white shadow rounded-lg p-6">
    <h2 class="text-xl mb-4">Streams</h2>
    <ul id="list" class="space-y-4"></ul>
  </div>
</div>

<script src="client.js"></script>
</body>
</html>

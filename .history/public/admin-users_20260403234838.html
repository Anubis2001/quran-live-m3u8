<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Management - Admin Panel</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen">

<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <!-- Header -->
  <div class="flex justify-between items-center mb-8">
    <div>
      <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent mb-2">
        <i class="fas fa-users-cog mr-2"></i>User Management
      </h1>
      <p class="text-gray-600">Manage users and permissions</p>
    </div>
    
    <div class="flex gap-3">
      <a href="/dashboard" class="bg-gray-600 hover:bg-gray-700 text-white px-4 py-2 rounded-lg transition-all shadow-md font-medium inline-flex items-center gap-2">
        <i class="fas fa-arrow-left"></i>
        Back to Dashboard
      </a>
      <button onclick="showCreateUserModal()" class="bg-gradient-to-r from-green-600 to-emerald-600 hover:from-green-700 hover:to-emerald-700 text-white px-4 py-2 rounded-lg transition-all shadow-md font-medium inline-flex items-center gap-2">
        <i class="fas fa-user-plus"></i>
        New User
      </button>
    </div>
  </div>

  <!-- Error Message -->
  <div id="errorMessage" class="hidden fixed top-4 right-4 z-50 max-w-md animate-fade-in-down">
    <div class="bg-red-100 text-red-800 border-l-4 border-red-500 px-4 py-3 rounded shadow-lg">
      <strong class="font-semibold"><i class="fas fa-exclamation-triangle mr-2"></i>Error:</strong>
      <span id="errorText" class="ml-2"></span>
    </div>
  </div>

  <!-- Success Message -->
  <div id="successMessage" class="hidden fixed top-4 right-4 z-50 max-w-md animate-fade-in-down">
    <div class="bg-green-100 text-green-800 border-l-4 border-green-500 px-4 py-3 rounded shadow-lg">
      <strong class="font-semibold"><i class="fas fa-check-circle mr-2"></i>Success:</strong>
      <span id="successText" class="ml-2"></span>
    </div>
  </div>

  <!-- Users Table -->
  <div class="bg-white shadow-xl rounded-2xl overflow-hidden border border-gray-100">
    <div class="overflow-x-auto">
      <table class="w-full">
        <thead class="bg-gradient-to-r from-blue-600 to-indigo-600 text-white">
          <tr>
            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">Username</th>
            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">Email</th>
            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">Role</th>
            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">Status</th>
            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">Last Login</th>
            <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">Created</th>
            <th class="px-6 py-4 text-right text-sm font-semibold uppercase tracking-wider">Actions</th>
          </tr>
        </thead>
        <tbody id="usersTableBody" class="divide-y divide-gray-200">
          <!-- Users will be loaded here -->
        </tbody>
      </table>
    </div>
    
    <!-- Empty State -->
    <div id="emptyState" class="hidden text-center py-12">
      <i class="fas fa-users text-6xl text-gray-300 mb-4"></i>
      <p class="text-gray-500 text-lg">No users found</p>
    </div>
  </div>
</div>

<!-- Create/Edit User Modal -->
<div id="userModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-2xl shadow-2xl max-w-md w-full p-6 transform transition-all">
    <div class="flex justify-between items-center mb-6">
      <h3 class="text-2xl font-bold text-gray-800" id="modalTitle">
        <i class="fas fa-user-plus text-green-600 mr-2"></i>Create User
      </h3>
      <button onclick="hideUserModal()" class="text-gray-400 hover:text-gray-600">
        <i class="fas fa-times text-xl"></i>
      </button>
    </div>
    
    <form id="userForm" class="space-y-4">
      <input type="hidden" id="editUserId">
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Username *</label>
        <input type="text" id="modalUsername" placeholder="Enter username"
          class="w-full border-2 border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 p-3 rounded-lg outline-none"
          required pattern="[a-zA-Z0-9_]{3,30}">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
        <input type="email" id="modalEmail" placeholder="user@example.com"
          class="w-full border-2 border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 p-3 rounded-lg outline-none">
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password <span id="passwordHint">*</span></label>
        <input type="password" id="modalPassword" placeholder="Enter password"
          class="w-full border-2 border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 p-3 rounded-lg outline-none"
          minlength="8">
        <p class="text-xs text-gray-500 mt-1">Minimum 8 characters (required for new users)</p>
      </div>
      
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Role</label>
        <select id="modalRole" class="w-full border-2 border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 p-3 rounded-lg outline-none">
          <option value="user">User (View Only)</option>
          <option value="admin">Admin (Full Access)</option>
        </select>
      </div>
      
      <div id="activeCheckbox" class="flex items-center">
        <input type="checkbox" id="modalActive" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 border-2 border-gray-300" checked>
        <label for="modalActive" class="ml-2 text-sm text-gray-700">Account Active</label>
      </div>
      
      <div class="flex gap-3 justify-end pt-4">
        <button type="button" onclick="hideUserModal()" class="px-6 py-2 bg-gray-200 hover:bg-gray-300 text-gray-800 rounded-lg transition-all font-medium">
          Cancel
        </button>
        <button type="submit" id="saveUserBtn" class="px-6 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white rounded-lg transition-all font-medium shadow-md">
          <i class="fas fa-save mr-2"></i>Save User
        </button>
      </div>
    </form>
  </div>
</div>

<script>
let authToken = null;
let currentUser = null;

// Initialize
window.addEventListener('DOMContentLoaded', async () => {
  await checkAuth();
});

async function checkAuth() {
  const token = getCookie('sessionToken');
  
  if (!token) {
    window.location.href = '/login.html';
    return;
  }
  
  try {
    const response = await fetch('/api/auth/me', {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    
    const data = await response.json();
    
    if (data.success && data.user.role === 'admin') {
      authToken = token;
      currentUser = data.user;
      loadUsers();
    } else {
      showError('Access denied. Admin privileges required.');
      setTimeout(() => window.location.href = '/dashboard', 2000);
    }
  } catch (err) {
    console.error('Auth check failed:', err);
    window.location.href = '/login.html';
  }
}

async function loadUsers() {
  try {
    const response = await fetch('/api/users', {
      headers: { 'Authorization': `Bearer ${authToken}` }
    });
    
    const data = await response.json();
    
    if (data.success) {
      renderUsers(data.users);
    } else {
      showError('Failed to load users');
    }
  } catch (err) {
    console.error('Load users error:', err);
    showError('Network error while loading users');
  }
}

function renderUsers(users) {
  const tbody = document.getElementById('usersTableBody');
  const emptyState = document.getElementById('emptyState');
  
  if (users.length === 0) {
    tbody.innerHTML = '';
    emptyState.classList.remove('hidden');
    return;
  }
  
  emptyState.classList.add('hidden');
  
  tbody.innerHTML = users.map(user => `
    <tr class="hover:bg-gray-50 transition-colors">
      <td class="px-6 py-4 whitespace-nowrap">
        <div class="flex items-center">
          <div class="flex-shrink-0 h-10 w-10 bg-gradient-to-r from-blue-500 to-indigo-500 rounded-full flex items-center justify-center text-white font-bold">
            ${user.username.charAt(0).toUpperCase()}
          </div>
          <div class="ml-4">
            <div class="text-sm font-medium text-gray-900">${user.username}</div>
            <div class="text-xs text-gray-500">ID: ${user.id.substring(0, 8)}...</div>
          </div>
        </div>
      </td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-900">${user.email || '-'}</td>
      <td class="px-6 py-4 whitespace-nowrap">
        <span class="inline-flex px-2 py-1 text-xs font-semibold rounded-full ${
          user.role === 'admin' ? 'bg-purple-100 text-purple-800' : 'bg-blue-100 text-blue-800'
        }">
          ${user.role}
        </span>
      </td>
      <td class="px-6 py-4 whitespace-nowrap">
        <span class="inline-flex px-2 py-1 text-xs font-semibold rounded-full ${
          user.is_active ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'
        }">
          ${user.is_active ? 'Active' : 'Suspended'}
        </span>
      </td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        ${user.last_login ? new Date(user.last_login).toLocaleString() : 'Never'}
      </td>
      <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
        ${new Date(user.created_at).toLocaleDateString()}
      </td>
      <td class="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
        <button onclick="editUser('${user.id}')" class="text-blue-600 hover:text-blue-900 mr-3">
          <i class="fas fa-edit"></i>
        </button>
        ${user.id !== currentUser.id ? `
          <button onclick="deleteUser('${user.id}', '${user.username}')" class="text-red-600 hover:text-red-900">
            <i class="fas fa-trash"></i>
          </button>
        ` : '<span class="text-gray-400 text-xs">(You)</span>'}
      </td>
    </tr>
  `).join('');
}

function showCreateUserModal() {
  document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-plus text-green-600 mr-2"></i>Create User';
  document.getElementById('userForm').reset();
  document.getElementById('editUserId').value = '';
  document.getElementById('passwordHint').classList.remove('hidden');
  document.getElementById('modalPassword').required = true;
  document.getElementById('userModal').classList.remove('hidden');
}

function editUser(userId) {
  // Find user in current list and populate form
  // For now, just show the modal with userId
  document.getElementById('modalTitle').innerHTML = '<i class="fas fa-user-edit text-blue-600 mr-2"></i>Edit User';
  document.getElementById('editUserId').value = userId;
  document.getElementById('passwordHint').classList.add('hidden');
  document.getElementById('modalPassword').required = false;
  document.getElementById('userModal').classList.remove('hidden');
}

function hideUserModal() {
  document.getElementById('userModal').classList.add('hidden');
}

document.getElementById('userForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const userId = document.getElementById('editUserId').value;
  const userData = {
    username: document.getElementById('modalUsername').value.trim(),
    email: document.getElementById('modalEmail').value.trim(),
    password: document.getElementById('modalPassword').value,
    role: document.getElementById('modalRole').value,
    is_active: document.getElementById('modalActive').checked
  };
  
  const saveBtn = document.getElementById('saveUserBtn');
  saveBtn.disabled = true;
  saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Saving...';
  
  try {
    const url = userId ? `/api/users/${userId}` : '/api/users';
    const method = userId ? 'PUT' : 'POST';
    
    const response = await fetch(url, {
      method,
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${authToken}`
      },
      body: JSON.stringify(userData)
    });
    
    const data = await response.json();
    
    if (data.success) {
      showSuccess(userId ? 'User updated successfully' : 'User created successfully');
      hideUserModal();
      loadUsers();
    } else {
      showError(data.error || 'Operation failed');
    }
  } catch (err) {
    console.error('Save user error:', err);
    showError('Network error. Please try again.');
  } finally {
    saveBtn.disabled = false;
    saveBtn.innerHTML = '<i class="fas fa-save mr-2"></i>Save User';
  }
});

async function deleteUser(userId, username) {
  if (!confirm(`Are you sure you want to delete user "${username}"? This action cannot be undone.`)) {
    return;
  }
  
  try {
    const response = await fetch(`/api/users/${userId}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${authToken}` }
    });
    
    const data = await response.json();
    
    if (data.success) {
      showSuccess('User deleted successfully');
      loadUsers();
    } else {
      showError(data.error || 'Failed to delete user');
    }
  } catch (err) {
    console.error('Delete user error:', err);
    showError('Network error. Please try again.');
  }
}

function showError(message) {
  document.getElementById('errorText').textContent = message;
  document.getElementById('errorMessage').classList.remove('hidden');
  setTimeout(() => document.getElementById('errorMessage').classList.add('hidden'), 5000);
}

function showSuccess(message) {
  document.getElementById('successText').textContent = message;
  document.getElementById('successMessage').classList.remove('hidden');
  setTimeout(() => document.getElementById('successMessage').classList.add('hidden'), 5000);
}

function getCookie(name) {
  const cookies = document.cookie.split(';');
  for (let cookie of cookies) {
    const [key, value] = cookie.trim().split('=');
    if (key === name) return value;
  }
  return null;
}
</script>

</body>
</html>

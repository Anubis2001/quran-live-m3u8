<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password - HLS Streaming Server</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full">
  <!-- Logo/Header -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-r from-yellow-500 to-orange-500 rounded-full mb-4 shadow-lg">
      <i class="fas fa-key text-white text-3xl"></i>
    </div>
    <h1 class="text-4xl font-bold bg-gradient-to-r from-yellow-600 to-orange-700 bg-clip-text text-transparent mb-2">
      Reset Password
    </h1>
    <p class="text-gray-600">Recover your account access</p>
  </div>

  <!-- Forgot Password Card -->
  <div class="bg-white shadow-2xl rounded-2xl p-8 border border-gray-100">
    <h2 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
      <i class="fas fa-envelope text-yellow-600 mr-2"></i>
      Request Reset
    </h2>

    <!-- Info Box -->
    <div class="mb-6 bg-blue-50 border-l-4 border-blue-500 text-blue-800 px-4 py-3 rounded">
      <p class="text-sm">
        <i class="fas fa-info-circle mr-2"></i>
        Enter your email address and we'll send you a link to reset your password.
      </p>
    </div>

    <!-- Error Message -->
    <div id="errorMessage" class="hidden mb-4 bg-red-100 border-l-4 border-red-500 text-red-800 px-4 py-3 rounded">
      <strong class="font-semibold"><i class="fas fa-exclamation-triangle mr-2"></i>Error:</strong>
      <span id="errorText"></span>
    </div>

    <!-- Success Message -->
    <div id="successMessage" class="hidden mb-4 bg-green-100 border-l-4 border-green-500 text-green-800 px-4 py-3 rounded">
      <strong class="font-semibold"><i class="fas fa-check-circle mr-2"></i>Success:</strong>
      <span id="successText"></span>
    </div>

    <form id="forgotForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Email Address</label>
        <div class="relative">
          <i class="fas fa-envelope absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
          <input type="email" id="email" placeholder="Enter your email address"
            class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 focus:border-yellow-500 focus:ring-2 focus:ring-yellow-200 rounded-lg transition-all outline-none"
            required autocomplete="email">
        </div>
      </div>

      <button type="submit" id="forgotBtn" class="w-full bg-gradient-to-r from-yellow-500 to-orange-500 text-white px-6 py-3 rounded-lg hover:from-yellow-600 hover:to-orange-600 transition-all shadow-lg hover:shadow-xl font-semibold disabled:opacity-50 disabled:cursor-not-allowed">
        <i class="fas fa-paper-plane mr-2"></i>
        <span id="btnText">Send Reset Link</span>
        <i id="btnSpinner" class="fas fa-spinner fa-spin hidden ml-2"></i>
      </button>
    </form>

    <!-- Back to Login -->
    <div class="mt-6 text-center">
      <a href="/login.html" class="text-sm text-gray-600 hover:text-gray-800 font-medium inline-flex items-center">
        <i class="fas fa-arrow-left mr-2"></i>
        Back to Login
      </a>
    </div>
  </div>

  <!-- Info Footer -->
  <div class="mt-6 text-center text-sm text-gray-500">
    <p>For security reasons, we won't tell you if an email exists</p>
  </div>
</div>

<script>
  // Handle forgot password
  document.getElementById('forgotForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const email = document.getElementById('email').value.trim();
    const forgotBtn = document.getElementById('forgotBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    
    // Disable button and show spinner
    forgotBtn.disabled = true;
    btnText.textContent = 'Sending...';
    btnSpinner.classList.remove('hidden');
    
    hideMessages();
    
    try {
      const response = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      
      const data = await response.json();
      
      if (response.ok && data.success) {
        showSuccess(data.message || 'If an account exists with that email, a reset link has been sent');
        
        // Clear form
        document.getElementById('email').value = '';
      } else {
        showError(data.error || 'Failed to process request');
      }
    } catch (err) {
      console.error('Forgot password error:', err);
      showError('Network error. Please try again.');
    } finally {
      forgotBtn.disabled = false;
      btnText.textContent = 'Send Reset Link';
      btnSpinner.classList.add('hidden');
    }
  });

  function showError(message) {
    document.getElementById('errorText').textContent = message;
    document.getElementById('errorMessage').classList.remove('hidden');
  }

  function showSuccess(message) {
    document.getElementById('successText').textContent = message;
    document.getElementById('successMessage').classList.remove('hidden');
  }

  function hideMessages() {
    document.getElementById('errorMessage').classList.add('hidden');
    document.getElementById('successMessage').classList.add('hidden');
  }
</script>

</body>
</html>

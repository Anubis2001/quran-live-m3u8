<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - HLS Streaming Server</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body class="bg-gradient-to-br from-blue-50 via-indigo-50 to-purple-50 min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full">
  <!-- Logo/Header -->
  <div class="text-center mb-8">
    <div class="inline-flex items-center justify-center w-20 h-20 bg-gradient-to-r from-blue-600 to-indigo-600 rounded-full mb-4 shadow-lg">
      <i class="fas fa-broadcast-tower text-white text-3xl"></i>
    </div>
    <h1 class="text-4xl font-bold bg-gradient-to-r from-blue-600 to-indigo-700 bg-clip-text text-transparent mb-2">
      HLS Streaming
    </h1>
    <p class="text-gray-600">Sign in to manage your streams</p>
  </div>

  <!-- Login Card -->
  <div class="bg-white shadow-2xl rounded-2xl p-8 border border-gray-100">
    <h2 class="text-2xl font-bold mb-6 text-gray-800 flex items-center">
      <i class="fas fa-sign-in-alt text-blue-600 mr-2"></i>
      Sign In
    </h2>

    <!-- Error Message -->
    <div id="errorMessage" class="hidden mb-4 bg-red-100 border-l-4 border-red-500 text-red-800 px-4 py-3 rounded">
      <strong class="font-semibold"><i class="fas fa-exclamation-triangle mr-2"></i>Error:</strong>
      <span id="errorText"></span>
    </div>

    <!-- Success Message -->
    <div id="successMessage" class="hidden mb-4 bg-green-100 border-l-4 border-green-500 text-green-800 px-4 py-3 rounded">
      <strong class="font-semibold"><i class="fas fa-check-circle mr-2"></i>Success:</strong>
      <span id="successText"></span>
    </div>

    <form id="loginForm" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
        <div class="relative">
          <i class="fas fa-user absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
          <input type="text" id="username" placeholder="Enter your username"
            class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 rounded-lg transition-all outline-none"
            required autocomplete="username">
        </div>
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
        <div class="relative">
          <i class="fas fa-lock absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"></i>
          <input type="password" id="password" placeholder="Enter your password"
            class="w-full pl-10 pr-4 py-3 border-2 border-gray-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 rounded-lg transition-all outline-none"
            required autocomplete="current-password">
        </div>
      </div>

      <div class="flex items-center justify-between">
        <label class="flex items-center">
          <input type="checkbox" id="rememberMe" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 border-2 border-gray-300">
          <span class="ml-2 text-sm text-gray-600">Remember me</span>
        </label>
        <a href="/forgot-password.html" class="text-sm text-blue-600 hover:text-blue-800 font-medium">
          Forgot password?
        </a>
      </div>

      <button type="submit" id="loginBtn" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white px-6 py-3 rounded-lg hover:from-blue-700 hover:to-indigo-700 transition-all shadow-lg hover:shadow-xl font-semibold disabled:opacity-50 disabled:cursor-not-allowed">
        <i class="fas fa-sign-in-alt mr-2"></i>
        <span id="btnText">Sign In</span>
        <i id="btnSpinner" class="fas fa-spinner fa-spin hidden ml-2"></i>
      </button>
    </form>

    <!-- Divider -->
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center">
        <div class="w-full border-t border-gray-300"></div>
      </div>
      <div class="relative flex justify-center text-sm">
        <span class="px-2 bg-white text-gray-500">Or</span>
      </div>
    </div>

    <!-- Register Link -->
    <div class="text-center">
      <p class="text-sm text-gray-600">
        Don't have an account?
        <a href="/register.html" class="font-medium text-blue-600 hover:text-blue-800">
          Create one now
        </a>
      </p>
    </div>
  </div>

  <!-- Info Footer -->
  <div class="mt-6 text-center text-sm text-gray-500">
    <p>Secure session-based authentication</p>
  </div>
</div>

<script>
  // Check if already logged in
  window.addEventListener('DOMContentLoaded', () => {
    const token = getCookie('sessionToken');
    if (token) {
      // Verify token is still valid
      fetch('/api/auth/me', {
        headers: { 'Authorization': `Bearer ${token}` }
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          window.location.href = '/dashboard';
        }
      })
      .catch(console.error);
    }
  });

  // Handle login
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const rememberMe = document.getElementById('rememberMe').checked;
    const loginBtn = document.getElementById('loginBtn');
    const btnText = document.getElementById('btnText');
    const btnSpinner = document.getElementById('btnSpinner');
    
    // Disable button and show spinner
    loginBtn.disabled = true;
    btnText.textContent = 'Signing in...';
    btnSpinner.classList.remove('hidden');
    
    hideMessages();
    
    try {
      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      
      const data = await response.json();
      
      if (response.ok && data.success) {
        // Set cookie
        setCookie('sessionToken', data.token, rememberMe ? 30 : 1);
        
        showSuccess('Login successful! Redirecting...');
        
        setTimeout(() => {
          window.location.href = '/dashboard';
        }, 1000);
      } else {
        showError(data.error || 'Login failed');
      }
    } catch (err) {
      console.error('Login error:', err);
      showError('Network error. Please try again.');
    } finally {
      loginBtn.disabled = false;
      btnText.textContent = 'Sign In';
      btnSpinner.classList.add('hidden');
    }
  });

  function showError(message) {
    document.getElementById('errorText').textContent = message;
    document.getElementById('errorMessage').classList.remove('hidden');
  }

  function showSuccess(message) {
    document.getElementById('successText').textContent = message;
    document.getElementById('successMessage').classList.remove('hidden');
  }

  function hideMessages() {
    document.getElementById('errorMessage').classList.add('hidden');
    document.getElementById('successMessage').classList.add('hidden');
  }

  function setCookie(name, value, days) {
    const expires = new Date(Date.now() + days * 24 * 60 * 60 * 1000).toUTCString();
    document.cookie = `${name}=${value};expires=${expires};path=/;SameSite=Strict`;
  }

  function getCookie(name) {
    const cookies = document.cookie.split(';');
    for (let cookie of cookies) {
      const [key, value] = cookie.trim().split('=');
      if (key === name) return value;
    }
    return null;
  }
</script>

</body>
</html>
